plugins {
    id 'de.featjar.java-library'
    id 'de.featjar.java-application'
}

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    api 'de.featjar:feature-model'
    api 'de.featjar:formula-analysis-sat4j'
    api 'de.featjar:formula-analysis-sharpsat'
    api 'de.featjar:uvl'
}

java {
    sourceCompatibility = 1.21
}

license {
    ext {
        licence_url = 'https://github.com/FeatureIDE/FeatJAR-feature-model-assistance'
    }
}
